<section id="title-slide" class="quarto-title-block$if(title-slide-attributes.class)$ $title-slide-attributes.class$$endif$"$if(title-slide-attributes.data-background-image)$ data-background-image="$title-slide-attributes.data-background-image$"$endif$$if(title-slide-attributes.data-background-size)$ data-background-size="$title-slide-attributes.data-background-size$"$endif$$if(title-slide-attributes.data-background-position)$ data-background-position="$title-slide-attributes.data-background-position$"$endif$$if(title-slide-attributes.data-background-color)$ data-background-color="$title-slide-attributes.data-background-color$"$endif$>

<div style="position: relative; width: 100%; height: 100%; min-height: 80vh;">

<div style="text-align: center; padding-top: 0.3em;">
$if(title)$<h1 class="title" style="white-space: nowrap; font-size: 2.8em; margin: 0;">$title$</h1>$endif$
$if(subtitle)$<p class="subtitle" style="font-size: 1.5em; margin-top: 0.5em;">$subtitle$</p>$endif$
$for(author)$<p class="author" style="font-size: 1.4em; margin: 0.3em 0;">$author$</p>$endfor$
$if(institute)$$for(institute)$<p class="institute" style="font-size: 1.4em; margin: 0.3em 0;">$institute$</p>$endfor$$endif$
$if(date)$<p class="date" style="font-size: 1.3em; margin: 0.3em 0;">$date$</p>$endif$
</div>

<img src="human-syzygy.png" alt="human syzygy" style="position: absolute; left: 0; bottom: 4%; width: 34%; height: auto; margin: 0;">

<img src="machine-syzygy.png" alt="machine syzygy" style="position: absolute; right: 0; bottom: 4%; width: 34%; height: auto; margin: 0;">

</div>

</section>
